# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Tel机器人签到

on:

  schedule:
    # 设置启动时间，为 UTC 时间, UTC23点 对应北京时间早7点
    - cron : '00 10 * * *'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
      TRUECAPTCHA_USERID: ${{ secrets.TRUECAPTCHA_USERID }}
      TRUECAPTCHA_APIKEY: ${{ secrets.TRUECAPTCHA_APIKEY }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run Telbot check
      run: |
        python all_in_one.py
    - name: Keepalive
      if: always()
      run: |
        mkdir -p .github
        date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .github/keepalive.txt
        git commit -m "chore: keep repository active" || exit 0
        git push
